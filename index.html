<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Busca de Animes - Jikan API</title>
    <style>
      :root {
        font-family: Inter, system-ui, sans-serif;
        background-color: #242424;
        color: white;
      }

      #app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
        text-align: center;
      }

      .search-box {
        margin-bottom: 2rem;
      }

      input {
        padding: 0.6rem;
        border-radius: 4px;
        border: 1px solid #ccc;
        width: 250px;
        color: #333;
      }

      button {
        padding: 0.6rem 1.2rem;
        border-radius: 4px;
        cursor: pointer;
        background-color: #646cff;
        color: white;
        border: none;
        margin-left: 10px;
      }

     
      .anime-grid {
        display: grid;
        
        grid-template-columns: repeat(3, 1fr); 
        gap: 20px;
        margin-top: 2rem;
        width: 100%;
      }

      .anime-card {
        background: #1a1a1a;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid #333;
        transition: transform 0.2s;
      }

      .anime-card img {
        width: 100%;
        height: 300px;
        object-fit: cover; 
        border-radius: 4px;
      }

      #loading {
        margin-top: 1rem;
        font-style: italic;
        color: #646cff;
      }

      
      @media (max-width: 768px) {
        .anime-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Busca de Animes</h1>
      
      <div class="search-box">
        <input type="text" id="animeInput" placeholder="Digite o nome do anime..." />
        <button id="searchBtn">Buscar</button>
      </div>
      
      <div id="loading" style="display: none;">Buscando no banco de dados...</div>
      <div id="error" style="color: #ff4a4a; margin-bottom: 1rem;"></div>
      
      <div id="results" class="anime-grid"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
